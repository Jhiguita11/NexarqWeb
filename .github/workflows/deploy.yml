name: Deploy a GitHub Pages

# Compila el sitio (Vite + bun) y lo publica en GitHub Pages en cada push a main.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues simultáneos.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar bun
        uses: oven-sh/setup-bun@v2

      - name: Instalar dependencias
        run: bun install --frozen-lockfile

      - name: Compilar
        run: bun run build

      # SPA fallback: GitHub Pages no reescribe rutas; servir index.html como
      # 404 hace que /servicios, /contacto, etc. funcionen al recargar.
      - name: Crear 404.html (SPA fallback)
        run: cp dist/index.html dist/404.html

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v4
